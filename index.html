<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>模擬店DX Pro - KITOPIA Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        .mode-panel { display: none; }
        .mode-panel.active { display: block; }
        #toast {
            visibility: hidden; min-width: 200px; background-color: #333; color: #fff;
            text-align: center; border-radius: 50px; padding: 10px; position: fixed;
            z-index: 1000; left: 50%; transform: translateX(-50%); bottom: 20px; font-weight: bold;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        #number-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 2000; flex-direction: column; align-items: center; justify-content: center; color: white;
        }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 20px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 20px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">
    <div id="number-overlay" onclick="this.style.display='none'">
        <div class="text-xl font-bold mb-2 text-white">受付完了</div>
        <div id="display-order-id" class="text-[12rem] font-black italic leading-none mb-6 text-white">#--</div>
        <div class="bg-white/10 px-8 py-3 rounded-full text-xs font-bold backdrop-blur-sm text-white">タップして閉じる</div>
    </div>
    <div id="toast"></div>

    <nav class="bg-indigo-900 text-white shadow-xl sticky top-0 z-50">
        <div class="flex justify-around max-w-4xl mx-auto font-bold text-xs sm:text-sm">
            <button onclick="switchMode('cashier')" class="px-2 py-5 w-full text-center">レジ</button>
            <button onclick="switchMode('kitchen')" class="px-2 py-5 w-full text-center border-l border-indigo-800">キッチン</button>
            <button onclick="switchMode('history')" class="px-2 py-5 w-full text-center border-l border-indigo-800">履歴</button>
            <button onclick="switchMode('admin')" class="px-2 py-5 w-full text-center border-l border-indigo-800">設定</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 pb-24">
        <div id="cashier" class="mode-panel active">
            <div class="flex flex-col md:flex-row gap-6">
                <div class="flex-1 space-y-6">
                    <h2 class="font-bold text-gray-400 text-[10px] tracking-widest uppercase italic">Menu List</h2>
                    <div id="menu-list" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
                    <h2 class="font-bold text-gray-400 text-[10px] tracking-widest uppercase border-t pt-4 italic">Toppings</h2>
                    <div id="topping-list" class="flex flex-wrap gap-2"></div>
                </div>
                <div class="w-full md:w-80 bg-white p-5 rounded-3xl shadow-2xl border border-indigo-50 h-fit sticky top-24">
                    <h2 class="text-xl font-black mb-4 border-b pb-2 text-indigo-900 italic text-center text-black">CART</h2>
                    <input type="text" id="staff-name" class="w-full p-3 bg-gray-50 border rounded-xl mb-4 text-sm font-bold text-black" placeholder="担当者名">
                    <div id="cart-display" class="space-y-2 mb-6 min-h-[80px] text-xs font-medium text-black"></div>
                    <input type="text" id="order-memo" class="w-full p-3 border rounded-xl text-sm mb-4 text-black" placeholder="備考・カスタム">
                    <div class="flex justify-between items-center border-t pt-4 text-black">
                        <span class="text-gray-400 font-bold text-xs uppercase">Total</span>
                        <span id="cart-total" class="text-4xl font-black text-indigo-600">¥0</span>
                    </div>
                    <button onclick="submitOrder()" class="w-full mt-6 bg-indigo-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">確定・送信</button>
                    <button onclick="clearCart(true)" class="w-full mt-4 text-gray-400 text-[10px] font-bold underline">リセット</button>
                </div>
            </div>
        </div>

        <!-- キッチン、履歴、設定画面は省略なしで維持 -->
        <div id="kitchen" class="mode-panel">
            <h2 class="text-2xl font-black italic uppercase mb-6 text-black">Kitchen Queue</h2>
            <div id="order-queue" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
        <div id="history" class="mode-panel">
            <h2 class="text-xl font-bold mb-4 text-green-700 italic border-b uppercase">History</h2>
            <div id="completed-list" class="space-y-2"></div>
        </div>
        <div id="admin" class="mode-panel">
            <div class="bg-white p-5 rounded-2xl shadow border mb-6 text-black">
                <h2 class="font-bold mb-3 text-indigo-600 text-xs italic uppercase">Sync Settings</h2>
                <input type="text" id="gas-url" placeholder="GAS URL" class="w-full p-3 border rounded-xl text-xs font-bold mb-3 text-black">
                <button onclick="saveSettings()" class="w-full bg-indigo-100 text-indigo-700 py-3 rounded-xl font-bold text-sm">全員に同期</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-black">
                <div class="bg-white p-4 rounded-xl shadow border">
                    <h2 class="font-bold mb-2 text-xs border-b pb-1 uppercase italic text-black">Edit Menus</h2>
                    <div id="menu-admin-list" class="space-y-2 mb-4 max-h-60 overflow-y-auto"></div>
                    <div class="bg-gray-50 p-2 rounded-lg border-2 border-dashed border-gray-200">
                        <input type="text" id="new-menu-name" placeholder="名称" class="w-full p-2 border rounded mb-1 text-xs text-black">
                        <div class="flex gap-2">
                            <input type="number" id="new-menu-price" placeholder="価格" class="flex-1 p-2 border rounded text-xs text-black">
                            <input type="color" id="new-menu-color" value="#6366f1" class="w-10 h-10 border rounded bg-white">
                        </div>
                        <button onclick="addMenu()" class="w-full bg-indigo-600 text-white py-2 mt-2 rounded font-bold text-xs">追加</button>
                    </div>
                </div>
                <div class="bg-white p-4 rounded-xl shadow border text-black font-bold">
                    <h2 class="font-bold mb-2 text-xs border-b pb-1 uppercase italic text-green-600">Edit Toppings</h2>
                    <div id="topping-admin-list" class="space-y-2 mb-4 max-h-60 overflow-y-auto"></div>
                    <div class="bg-gray-50 p-2 rounded-lg border-2 border-dashed border-gray-200">
                        <input type="text" id="new-topping-name" placeholder="名称" class="w-full p-2 border rounded mb-1 text-xs text-black">
                        <input type="number" id="new-topping-price" placeholder="価格" class="w-full p-2 border rounded text-xs text-black">
                        <button onclick="addToppingMaster()" class="w-full bg-green-600 text-white py-2 mt-2 rounded font-bold text-xs">追加</button>
                    </div>
                </div>
            </div>
            <div class="mt-12 text-center">
                <button onclick="clearAllData()" class="text-red-500 font-bold text-[10px] underline hover:text-red-700">全データを完全にリセット</button>
            </div>
        </div>
    </main>

    <script>
        // 設定、Firebaseなどのロジック（そのまま）
        const firebaseConfig = {
            apiKey: "AIzaSyBCEAZEtgA6NPf9I2H1BK-2QLwuDj3VeUs",
            authDomain: "kitppiaapp2.firebaseapp.com",
            databaseURL: "https://kitppiaapp2-default-rtdb.firebaseio.com",
            projectId: "kitppiaapp2",
            storageBucket: "kitppiaapp2.firebasestorage.app",
            messagingSenderId: "753995869602",
            appId: "1:753995869602:web:6dc63029c621c4f01616fb"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let menuData = [], toppingData = [], orderData = [], gasUrl = "";
        let cartItems = [], cartToppings = [];

        db.ref('settings/gasUrl').on('value', snap => {
            gasUrl = snap.val() || "";
            const el = document.getElementById('gas-url'); if(el) el.value = gasUrl;
        });
        db.ref('menus').on('value', snap => { menuData = snap.val() || []; renderAll(); });
        db.ref('toppings').on('value', snap => { toppingData = snap.val() || []; renderAll(); });
        db.ref('orders').on('value', snap => {
            const val = snap.val() || {};
            orderData = Object.keys(val).map(k => ({ ...val[k], firebaseKey: k }));
            renderAll();
        });

        function switchMode(mode) {
            document.querySelectorAll('.mode-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(mode).classList.add('active');
            window.scrollTo(0,0);
        }
        function showToast(msg) {
            const t = document.getElementById("toast"); t.innerText = msg;
            t.className = "show"; setTimeout(() => t.className = "", 3000);
        }
        function saveSettings() {
            const url = document.getElementById('gas-url').value;
            db.ref('settings/gasUrl').set(url).then(() => showToast("同期完了"));
        }
        function addMenu() {
            const n = document.getElementById('new-menu-name').value, p = parseInt(document.getElementById('new-menu-price').value), c = document.getElementById('new-menu-color').value;
            if (n && p) { menuData.push({ id: Date.now(), name: n, price: p, color: c }); db.ref('menus').set(menuData); document.getElementById('new-menu-name').value = ""; }
        }
        function addToppingMaster() {
            const n = document.getElementById('new-topping-name').value, p = parseInt(document.getElementById('new-topping-price').value) || 0;
            if (n) { toppingData.push({ id: Date.now(), name: n, price: p }); db.ref('toppings').set(toppingData); document.getElementById('new-topping-name').value = ""; }
        }
        function editItem(type, index, field, value) {
            const list = (type === 'menu' ? menuData : toppingData);
            list[index][field] = (field === 'price' ? parseInt(value) || 0 : value);
            db.ref(type + 's').set(list);
        }
        function deleteItem(type, index) {
            if(!confirm("削除しますか？")) return;
            const target = (type === 'menu' ? menuData : toppingData);
            target.splice(index, 1);
            db.ref(type + 's').set(target);
        }
        function moveItem(type, index, dir) {
            const list = (type === 'menu' ? menuData : toppingData);
            if(index + dir < 0 || index + dir >= list.length) return;
            const item = list.splice(index, 1)[0];
            list.splice(index + dir, 0, item);
            db.ref(type + 's').set(list);
        }
        function clearCart(showMsg = false) {
            cartItems = []; cartToppings = [];
            document.getElementById('order-memo').value = "";
            renderAll();
            if(showMsg) showToast("リセット完了");
        }

        // 【最重要】送信ロジックの修正
        function submitOrder() {
            if (cartItems.length === 0) return;
            const tText = cartToppings.map(t => t.name).join(", "); // トッピング名だけを抽出
            const nextId = orderData.length + 1;
            const order = {
                id: nextId,
                items: cartItems.map(i => i.name).join(", "),
                toppings: tText, // ← GASの data.toppings と一致させる
                memo: document.getElementById('order-memo').value || "",
                staff: document.getElementById('staff-name').value || "未記入",
                total: cartItems.reduce((s,i)=>s+i.price,0) + cartToppings.reduce((s,t)=>s+t.price,0),
                time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                completed: false
            };
            db.ref('orders').push(order);
            if(gasUrl) fetch(gasUrl, {method: "POST", mode: "no-cors", body: JSON.stringify(order)});
            document.getElementById('display-order-id').innerText = "#" + nextId;
            document.getElementById('number-overlay').style.display = 'flex';
            clearCart(false);
        }

        function toggleStatus(key) {
            const o = orderData.find(x => x.firebaseKey === key);
            db.ref('orders/' + key).update({ completed: !o.completed });
        }
        function clearAllData() {
            if (confirm("全データをリセットします。宜しいですか？")) { db.ref('/').remove().then(() => location.reload()); }
        }
        function renderAll() {
            document.getElementById('menu-list').innerHTML = menuData.map(m => `<button onclick='cartItems.push(${JSON.stringify(m)});renderAll();' style="background-color: ${m.color}" class="p-4 rounded-2xl shadow-sm font-bold text-black h-24 text-xs active:scale-95 transition-all font-bold text-black">${m.name}<br>¥${m.price}</button>`).join('');
            document.getElementById('topping-list').innerHTML = toppingData.map(t => `<button onclick='cartToppings.push(${JSON.stringify(t)});renderAll();' class="px-4 py-2 bg-white border rounded-full text-[10px] font-bold text-black shadow-sm mb-1">+ ${t.name} (¥${t.price})</button>`).join('');
            const total = cartItems.reduce((s,i)=>s+i.price,0) + cartToppings.reduce((s,t)=>s+t.price,0);
            document.getElementById('cart-total').innerText = `¥${total.toLocaleString()}`;
            document.getElementById('cart-display').innerHTML = cartItems.map(i => `<div class="flex justify-between font-bold text-black"><span>${i.name}</span><span>¥${i.price}</span></div>`).join('') + cartToppings.map(t => `<div class="text-indigo-500 italic text-[10px] font-bold">+ ${t.name}</div>`).join('');
            const queue = orderData.filter(o => !o.completed);
            document.getElementById('order-queue').innerHTML = queue.map(o => `<div class="bg-white p-6 rounded-3xl shadow-xl border-l-[12px] border-indigo-600 mb-4 text-black"><div class="flex justify-between items-start mb-1"><span class="text-5xl font-black italic text-indigo-900">#${o.id}</span></div><div class="text-2xl font-black text-black">${o.items}</div><div class="text-indigo-600 font-bold text-sm">${o.toppings ? '+ ' + o.toppings : ''}</div>${o.memo ? `<div class="text-gray-500 text-xs mt-1 bg-gray-50 p-2 rounded italic font-bold text-black">MEMO: ${o.memo}</div>` : ''}<button onclick="toggleStatus('${o.firebaseKey}')" class="w-full bg-gray-900 text-white py-5 rounded-2xl font-black mt-4">提供完了</button></div>`).join('');
            document.getElementById('completed-list').innerHTML = orderData.filter(o => o.completed).reverse().slice(0, 5).map(o => `<div class="bg-white p-3 rounded-xl border flex justify-between items-center text-xs mb-1 text-black font-bold font-medium font-bold text-black"><span>#${o.id} ${o.items}</span><button onclick="toggleStatus('${o.firebaseKey}')" class="text-indigo-600 underline">戻す</button></div>`).join('');
            document.getElementById('menu-admin-list').innerHTML = menuData.map((m, i) => `<div class="flex flex-col bg-gray-50 p-2 rounded border gap-1 mb-2 text-black font-bold text-black"><input type="text" value="${m.name}" onchange="editItem('menu', ${i}, 'name', this.value)" class="p-1 text-[10px] border rounded font-bold text-black"><input type="number" value="${m.price}" onchange="editItem('menu', ${i}, 'price', this.value)" class="p-1 text-[10px] border rounded font-bold text-black"><div class="flex justify-end gap-1"><button onclick="moveItem('menu', ${i}, -1)" class="p-1 px-2 bg-gray-200 rounded text-[10px]">↑</button><button onclick="moveItem('menu', ${i}, 1)" class="p-1 px-2 bg-gray-200 rounded text-[10px]">↓</button><button onclick="deleteItem('menu', ${i})" class="p-1 px-2 bg-red-100 text-red-600 rounded">×</button></div></div>`).join('');
            document.getElementById('topping-admin-list').innerHTML = toppingData.map((t, i) => `<div class="flex flex-col bg-gray-50 p-2 rounded border gap-1 mb-2 text-black font-bold text-black"><input type="text" value="${t.name}" onchange="editItem('topping', ${i}, 'name', this.value)" class="p-1 text-[10px] border rounded font-bold text-black"><input type="number" value="${t.price}" onchange="editItem('topping', ${i}, 'price', this.value)" class="p-1 text-[10px] border rounded font-bold text-black"><div class="flex justify-end gap-1"><button onclick="moveItem('topping', ${i}, -1)" class="p-1 px-2 bg-gray-200 rounded text-[10px]">↑</button><button onclick="moveItem('topping', ${i}, 1)" class="p-1 px-2 bg-gray-200 rounded text-[10px]">↓</button><button onclick="deleteItem('topping', ${i})" class="p-1 px-2 bg-red-100 text-red-600 rounded">×</button></div></div>`).join('');
        }
        renderAll();
    </script>
</body>
</html>
